version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aub_library_db
    environment:
      POSTGRES_USER: aub_library
      POSTGRES_PASSWORD: aub_library_pass
      POSTGRES_DB: aub_library
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aub_library"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        CACHEBUST: ${CACHEBUST:-1}
    container_name: aub_library_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aub_library:aub_library_pass@db:5432/aub_library
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
